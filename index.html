<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة سعرات العجز - فت ويب</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="main-container">
    <header class="site-header">
        <div class="user-icon">👤</div>
        <div class="logo-area">
            <h1 class="logo-text">FitTek</h1>
            <p class="subtitle">رياضة . تغذية . نتائج</p>
        </div>
    </header>

    <div class="calculator-grid"><!-- 1 -->
        

        <div class="card input-card"><!-- 1.1 -->

            <h2 class="card-title">حاسب سعرات العجز</h2>
            <form id="calorie-form">

                <div class="form-group"><!-- 1.1.1 -->

                    <label>الجنس</label>


                    <div class="gender-toggle"><!-- 1.1.1.0 -->
                        <button onclick="genderUS(this)" type="button" class="gender-btn male active" data-gender="male">ذكر</button>
                        <button onclick="genderUS(this)" type="button" class="gender-btn female" data-gender="female">أنثى</button>
                    </div><!-- 1.1.1.0 -->

                </div><!-- 1.1.1 -->

                <div class="form-group row-input"><!-- 1.1.2 -->
                    <label>الطول</label>

                    <div class="input-with-unit"><!-- 1.1.2.1 -->

                        <input type="number" id="height" placeholder="175" required>
                        <span class="unit">سم</span>

                    </div><!-- 1.1.2.1 -->

                </div><!-- 1.1.2 -->


                <div class="form-group row-input"><!-- 1.1.3 -->
                    <label>العمر</label>

                    <div class="input-with-unit"><!-- 1.1.3.1 -->

                        <input type="number" id="age" placeholder="25" required>
                        <span class="unit">سنة</span>

                    </div><!-- 1.1.3.1 -->

                </div><!-- 1.1.3 -->



                <div class="form-group row-input"><!-- 1.1.4 -->

                    <label>الوزن الحالي</label>

                    <div class="input-with-unit"><!-- 1.4.1 -->
                        <input type="number" id="weight" placeholder="80" required>
                        <span class="unit">كجم</span>

                    </div><!-- 1.4.1 -->

                </div><!-- 1.1.4 -->

<div class="form-group"><!-- 1.1.5 -->

    <label for="loss-rate">معدل نزول الوزن الأسبوعي</label>

    <select id="loss-rate">
        <option value="500">نص كيلو في الأسبوع </option>
        <option value="1000">كيلو واحد في الأسبوع </option>
        <option value="1500">كيلو ونص في الأسبوع </option>
    </select>

</div><!-- 1.1.5 -->



<div class="form-group"><!-- 1.1.6 -->

    <label for="activity-level">مستوى النشاط</label>

    <select id="activity-level">
        <option value="">غير محدد</option>
        <option value="1.2">خامل أو كثير الجلوس</option>
        <option value="1.375">نشاط خفيف 1-3 مرات في الأسبوع</option>
        <option value="1.55">نشاط متوسط الشدة 3-5 مرات في الأسبوع</option>
        <option value="1.725">نشاط عالي جداً 6-7 مرات في الأسبوع</option>
        <option value="1.9">نشاط عالي للغاية أو ممارسة رياضة يومية مجهدة</option>
    </select>

</div><!-- 1.1.6 -->



            <button type="submit" class="calculate-btn">إحسب</button>
            </form>

        </div><!-- 1.1 -->

   
<div class="card results-card"><!-- 1.2 -->

    <h2 class="card-title">نتائجك 📊</h2>
    
    <!-- نضع النتائج داخل حاوية لنتمكن من التحكم بظهورها -->

    <div id="results-content" style="opacity: 0.3; pointer-events: none;"><!-- 1.2.1 -->

        <div class="result-highlight"><!-- 1.2.1.1 -->

            <p>السعرات اليومية المناسبة لك</p>

            <div class="calories-value-container"><!-- 1.2.1.1.1 -->

                <span class="fire-icon">🔥</span>
                <h3 class="calories-number" id="result-calories">0</h3>

            </div><!-- 1.2.1.1.1 -->

            <p class="unit-label">سعرة حرارية / يوم</p>

        </div><!-- 1.2.1.1 -->

        <div class="macros-section"><!-- 1.2.1.2 -->

            <div class="macros-container">

                <div class="chart-container">
                    <canvas id="macrosChart"></canvas>
                </div>

                <div class="macros-details">
                    <div class="macro-item protein"><span class="dot"></span> البروتين: <span id="protein-g">0</span> جم</div>
                    <div class="macro-item carbs"><span class="dot"></span> الكارب: <span id="carbs-g">0</span> جم</div>
                    <div class="macro-item fats"><span class="dot"></span> الدهون: <span id="fats-g">0</span> جم</div>
                </div>
            </div>

        </div><!-- 1.2.1.2 -->

    </div><!-- 1.2.1 -->

    <!-- نضعه في نهاية لوحة النتائج -->

<div class="note-box"><!-- 1.2.2 -->

    <span class="info-icon">⚠️</span>
    <p>ملحوظة: هذه الأرقام تقريبية وليست دقيقة بنسبة 100%. الاستمرارية في التمرين والنوم والتغذية السليمة هي مفتاح النجاح الحقيقي.</p>

</div><!-- 1.2.2 -->

</div><!-- 1.2 -->


<!-- تم تعديل المسار للرجوع خطوة للخلف والدخول لمجلد js -->
<script src="script.js"></script>
</body>
</html>
